name: Release

# Publish @mcp-index/mastra to npm when a version tag is pushed.
#   git tag v0.1.3 && git push origin v0.1.3
# Uses npm Trusted Publishing (OIDC): no NPM_TOKEN secret, provenance attached.
# One-time setup: on npmjs.com, package Settings -> Trusted Publishing -> add a
# GitHub Actions publisher (org: mcpindex-ai, repo: mcpindex-mastra,
# workflow: release.yml). Until that is configured, the publish step will fail
# with an auth error - the build/test gates still run.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing requires npm >= 11.5.1; the Node-bundled npm is older.
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} (=${TAG}) does not match package.json version ${PKG}"
            exit 1
          fi
          echo "tag matches package.json version ${PKG}"

      # Build first: the test suite imports the compiled dist/.
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

      - run: npm publish --access public --provenance
