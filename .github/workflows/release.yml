name: Release

# Publish @mcp-index/mastra to npm when a version tag is pushed.
#   git tag v0.1.3 && git push origin v0.1.3
# Uses npm Trusted Publishing (OIDC): no NPM_TOKEN secret, provenance attached.
# One-time setup: on npmjs.com, package Settings -> Trusted Publishing -> add a
# GitHub Actions publisher (org: mcpindex-ai, repo: mcpindex-mastra,
# workflow: release.yml). Until that is configured, the publish step will fail
# with an auth error - the build/test gates still run.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

# Serialize releases: two tag pushes close together publish predictably in order
# rather than racing. Never cancel a publish already in flight.
concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs: this job holds id-token: write and publish
      # rights, so a moved tag on a dependency must not silently run new code here.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing requires npm >= 11.5.1; the Node-bundled npm is older.
      # Pinned (not @latest) so an OIDC-privileged job never pulls an unvetted npm.
      - run: npm install -g npm@11.11.0

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} (=${TAG}) does not match package.json version ${PKG}"
            exit 1
          fi
          echo "tag matches package.json version ${PKG}"

      # Build first: the test suite imports the compiled dist/.
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

      - run: npm publish --access public --provenance
